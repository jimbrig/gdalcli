name: R-CMD-check (Docker)

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  determine-gdal-version:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      latest-gdal: ${{ steps.version.outputs.latest }}
    steps:
      - name: Query GHCR for latest deps image
        id: version
        run: |
          # Fetch all package versions and find the latest deps-gdal version
          LATEST=""
          PAGE=1
          while true; do
            RESPONSE=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/users/${{ github.repository_owner }}/packages/container/gdalcli/versions?page=${PAGE}&per_page=100")

            # Extract all deps-gdal versions from this page
            VERSIONS=$(echo "$RESPONSE" | jq -r '.[].metadata.container.tags[] | select(startswith("deps-gdal-")) | gsub("deps-gdal-|-amd64"; "") | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))' 2>/dev/null)

            # Update LATEST if we found any versions on this page
            if [ -n "$VERSIONS" ]; then
              LATEST=$(echo -e "${LATEST}\n${VERSIONS}" | sort -Vr | head -1)
            fi

            # Check how many items were in this page's response
            COUNT=$(echo "$RESPONSE" | jq 'length')

            # If we got fewer than 100 results, this is the last page
            if [ "$COUNT" -lt 100 ]; then
              break
            fi

            PAGE=$((PAGE + 1))
          done

          if [ -z "$LATEST" ]; then
            echo "ERROR: Could not find any deps-gdal images in GHCR"
            exit 1
          fi

          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "Found latest GDAL version in GHCR: $LATEST"
          
  check:
    needs: determine-gdal-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - r-version: 'release'
            gdal-version: '3.11.4'
          - r-version: 'devel'
            gdal-version: ${{ needs.determine-gdal-version.outputs.latest-gdal }}

    container:
      image: ghcr.io/${{ github.repository }}:deps-gdal-${{ matrix.gdal-version }}-amd64
      env:
        R_VERSION: ${{ matrix.r-version }}

    name: R ${{ matrix.r-version }} / GDAL ${{ matrix.gdal-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify GDAL environment
        run: |
          echo "=== System Info ===" 
          uname -a
          echo "=== GDAL ===" 
          gdal --version
          which gdal
          echo "=== R ===" 
          R --version | head -6
          echo "=== R packages ===" 
          Rscript -e "sessionInfo()"

      - name: Verify development dependencies
        run: |
          Rscript -e "if (!require('devtools', quietly=TRUE)) stop('devtools not installed in base image')"

      - name: Generate GDAL API
        run: |
          Rscript build/generate_gdal_api.R

      - name: Document package
        run: |
          Rscript -e "roxygen2::roxygenise()"

      - name: Run R CMD check
        run: |
          export LANG=en_US.UTF-8
          R CMD check --no-manual --compact-vignettes=gs+qpdf gdalcli

      - name: Install package
        run: |
          Rscript -e "devtools::install()"

      - name: Verify package installation
        run: |
          Rscript -e "library(gdalcli); cat('gdalcli loaded successfully\n'); print(gdal_capabilities())"

      - name: Report Arrow Support Status
        run: |
          Rscript -e "
          library(gdalcli)
          cat('=== Arrow Support Report ===\n')
          if (gdalcli:::.gdal_has_feature('arrow_vectors')) {
            cat('✓ Arrow in-memory vector processing: AVAILABLE\n')
            info <- gdalcli:::.get_gdal_arrow_support_info()
            cat('  GDAL version compatible:', info\$gdal_version_compatible, '\n')
            cat('  Arrow package version:', info\$arrow_package_version, '\n')
            cat('  gdalraster version:', info\$gdalraster_version, '\n')
            cat('  Driver detected:', info\$driver_detected, '\n')
          } else {
            cat('✗ Arrow in-memory vector processing: NOT AVAILABLE\n')
            info <- gdalcli:::.get_gdal_arrow_support_info()
            cat('  GDAL version compatible:', info\$gdal_version_compatible, '\n')
            cat('  Arrow package available:', !is.null(info\$arrow_package_version), '\n')
            cat('  gdalraster available:', !is.null(info\$gdalraster_version), '\n')
            cat('  Driver detected:', info\$driver_detected, '\n')
          }
          "

      - name: Show test and examples output
        if: always()
        run: |
          if [ -f "gdalcli.Rcheck/tests/runtests.Rout.fail" ]; then
            echo "=== Test Output (Failures) ==="
            tail -100 "gdalcli.Rcheck/tests/runtests.Rout.fail"
          elif [ -f "gdalcli.Rcheck/tests/runtests.Rout" ]; then
            echo "=== Test Output ==="
            tail -50 "gdalcli.Rcheck/tests/runtests.Rout"
          fi

          if [ -f "gdalcli.Rcheck/gdalcli-Ex.Rout" ]; then
            echo "=== Examples Output ==="
            tail -30 "gdalcli.Rcheck/gdalcli-Ex.Rout"
          fi

      - name: Upload check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: check-results-${{ matrix.r-version }}-gdal-${{ matrix.gdal-version }}
          path: gdalcli.Rcheck/
          retention-days: 7
          if-no-files-found: ignore
