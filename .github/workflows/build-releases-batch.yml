---
# Build Releases for Multiple GDAL Versions (Batch)
#
# Sequential workflow dispatch to build gdalcli for multiple GDAL versions.
# Versions are processed in order; stops on first failure.
#
# Strategy:
# - Takes comma-separated or newline-separated list of GDAL versions
# - Calls build-releases.yml for each version sequentially
# - Stops on first failure (fail-fast)
# - Each release is tagged and published independently
#
name: Build Releases (Batch)

on:
  workflow_dispatch:
    inputs:
      gdal_versions:
        description: |
          GDAL versions to build for (comma or newline separated).
          Example: 3.11.4, 3.12.0, 3.12.1
        required: true
      create_releases:
        description: 'Create GitHub releases and tags?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: 'Dry run mode: skip branch/release creation and image push'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  parse-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.parse.outputs.versions }}
      version-count: ${{ steps.parse.outputs.count }}
    steps:
      - name: Parse GDAL versions
        id: parse
        run: |
          # Convert comma or newline separated input to JSON array
          INPUT="${{ github.event.inputs.gdal_versions }}"

          # Replace newlines and commas with newlines, then filter empty lines
          VERSIONS=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')

          # Convert to JSON array
          JSON_ARRAY=$(echo "$VERSIONS" | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "versions=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "count=$(echo "$JSON_ARRAY" | jq 'length')" >> $GITHUB_OUTPUT

          echo "Parsed versions:"
          echo "$JSON_ARRAY" | jq -r '.[]' | nl

  build-releases:
    needs: parse-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1
    matrix:
      version: ${{ fromJson(needs.parse-versions.outputs.versions) }}
    uses: ./.github/workflows/build-releases.yml
    with:
      gdal_version: ${{ matrix.version }}
      create_release: ${{ github.event.inputs.create_releases }}
      dry_run: ${{ github.event.inputs.dry_run }}

  batch-summary:
    needs: [parse-versions, build-releases]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Batch build summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Batch Build Summary

          | Item | Value |
          |------|-------|
          | Versions Built | ${{ needs.parse-versions.outputs.version-count }} |
          | Status | ${{ needs.build-releases.result }} |
          | Dry Run | ${{ github.event.inputs.dry_run }} |
          | Create Releases | ${{ github.event.inputs.create_releases }} |
          EOF

          if [ "${{ needs.build-releases.result }}" != "success" ]; then
            echo "One or more builds failed"
            exit 1
          else
            echo "All builds completed successfully"
          fi
