---
# Build Releases for Multiple GDAL Versions (Batch)
#
# Sequential workflow dispatch to build gdalcli for multiple GDAL versions.
# Versions are processed in order; stops on first failure.
#
# Strategy:
# - Takes comma-separated or newline-separated list of GDAL versions
# - Calls build-releases.yml for each version sequentially
# - Stops on first failure (fail-fast)
# - Each release is tagged and published independently
#
name: Build Releases (Batch)

on:
  workflow_dispatch:
    inputs:
      gdal_versions:
        description: |
          GDAL versions to build for (comma or newline separated).
          Example: 3.11.4, 3.12.0, 3.12.1
        required: true
      create_releases:
        description: 'Create GitHub releases and tags?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: 'Dry run mode: skip branch/release creation and image push'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  parse-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.parse.outputs.versions }}
      version-count: ${{ steps.parse.outputs.count }}
    steps:
      - name: Parse GDAL versions
        id: parse
        run: |
          # Convert comma or newline separated input to JSON array
          INPUT="${{ github.event.inputs.gdal_versions }}"

          # Replace newlines and commas with newlines, then filter empty lines
          VERSIONS=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')

          # Convert to JSON array
          JSON_ARRAY=$(echo "$VERSIONS" | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "versions=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "count=$(echo "$JSON_ARRAY" | jq 'length')" >> $GITHUB_OUTPUT

          echo "Parsed versions:"
          echo "$JSON_ARRAY" | jq -r '.[]' | nl

  build-releases:
    needs: parse-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1
    steps:
      - name: Build each GDAL version sequentially
        run: |
          VERSIONS='${{ needs.parse-versions.outputs.versions }}'
          CREATE_RELEASES='${{ github.event.inputs.create_releases }}'
          DRY_RUN='${{ github.event.inputs.dry_run }}'

          echo "Building ${{ needs.parse-versions.outputs.version-count }} release(s)..."
          echo ""

          # Use matrix context to iterate (workaround: we'll use a bash loop instead)
          # For now, we need to call the workflow for each version

          VERSIONS_ARRAY=$(echo "$VERSIONS" | jq -r '.[]')
          VERSION_COUNT=$(echo "$VERSIONS_ARRAY" | wc -l)
          CURRENT=0

          while IFS= read -r VERSION; do
            CURRENT=$((CURRENT + 1))
            echo "=========================================="
            echo "Building release $CURRENT/$VERSION_COUNT"
            echo "GDAL Version: $VERSION"
            echo "=========================================="

            # Validate version format
            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "ERROR: Invalid version format: $VERSION (expected X.Y.Z)"
              exit 1
            fi
          done <<< "$VERSIONS_ARRAY"

      - name: Trigger build-releases for each version
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const versions = ${{ needs.parse-versions.outputs.versions }};
            const createReleases = '${{ github.event.inputs.create_releases }}';
            const dryRun = '${{ github.event.inputs.dry_run }}';

            console.log(`Building ${versions.length} release(s) sequentially...`);

            for (let i = 0; i < versions.length; i++) {
              const version = versions[i];
              console.log(`\n[${i + 1}/${versions.length}] Building GDAL ${version}...`);

              try {
                const response = await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'build-releases.yml',
                  ref: 'main',
                  inputs: {
                    gdal_version: version,
                    create_release: createReleases,
                    dry_run: dryRun
                  }
                });

                console.log(`✓ Triggered build for GDAL ${version}`);

                // Wait for the workflow to complete
                // Poll the workflow runs to find our job
                let completed = false;
                let attempts = 0;
                const maxAttempts = 120; // 10 minutes with 5 second intervals

                while (!completed && attempts < maxAttempts) {
                  await new Promise(resolve => setTimeout(resolve, 5000)); // Wait 5 seconds

                  const runs = await github.rest.actions.listWorkflowRuns({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: 'build-releases.yml',
                    per_page: 10
                  });

                  // Find the run we just triggered (by matching version and recent time)
                  const ourRun = runs.data.workflow_runs.find(run =>
                    run.name === 'Build Release for GDAL Version' &&
                    run.created_at > new Date(Date.now() - 2 * 60000).toISOString()
                  );

                  if (ourRun) {
                    console.log(`Build status: ${ourRun.status} (${ourRun.conclusion})`);

                    if (ourRun.status === 'completed') {
                      completed = true;
                      if (ourRun.conclusion !== 'success') {
                        throw new Error(`Build for GDAL ${version} failed with status: ${ourRun.conclusion}`);
                      }
                    }
                  }

                  attempts++;
                }

                if (!completed) {
                  throw new Error(`Build for GDAL ${version} timed out`);
                }

              } catch (error) {
                console.error(`✗ Failed to build GDAL ${version}: ${error.message}`);
                throw error;
              }
            }

            console.log(`\n✓ All ${versions.length} release(s) built successfully!`);

  batch-summary:
    needs: [parse-versions, build-releases]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Batch build summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Batch Build Summary

          | Item | Value |
          |------|-------|
          | Versions Built | ${{ needs.parse-versions.outputs.version-count }} |
          | Status | ${{ needs.build-releases.result }} |
          | Dry Run | ${{ github.event.inputs.dry_run }} |
          | Create Releases | ${{ github.event.inputs.create_releases }} |
          EOF

          if [ "${{ needs.build-releases.result }}" != "success" ]; then
            echo "One or more builds failed"
            exit 1
          else
            echo "All builds completed successfully"
          fi
