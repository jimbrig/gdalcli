---
# Build GDAL Docker Images (Consolidated)
#
# Builds both dependency images (deps) and full runtime images for gdalcli.
# Replaces the previous build-base-images.yml and build-runtime-images.yml.
#
# Image naming:
# - deps-gdal-X.Y.Z-amd64: Base images with GDAL + R + dependencies (for CI)
# - gdal-X.Y.Z-latest: Full runtime images with gdalcli installed (for users)
#
# This workflow should run:
# - Weekly on Saturday at 00:00 UTC
# - On manual dispatch
# - On pushes to main that affect Docker files
#
name: Build GDAL Docker Images

on:
  schedule:
    # Build weekly on Saturday at 00:00 UTC
    - cron: '0 0 * * SAT'
  push:
    branches:
      - main
      - master
    paths:
      - '.github/dockerfiles/Dockerfile.template'
      - '.github/workflows/build-docker-images.yml'
      - '.github/versions.json'
      - 'DESCRIPTION'
  workflow_dispatch:
    inputs:
      gdal_version:
        description: 'GDAL version(s) to build (e.g., 3.12.1 or 3.11.4,3.12.2 for multiple)'
        required: false
        default: ''
        type: string
      image_stage:
        description: 'Image stage to build'
        required: true
        default: 'both'
        type: choice
        options:
          - 'both'
          - 'deps'
          - 'full'
      push_images:
        description: 'Push images to GitHub Container Registry?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      force_rebuild:
        description: 'Force rebuild even if images exist?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      disable_cache:
        description: 'Disable Docker layer caching to force fresh rebuild?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      cache_version:
        description: 'Cache version (increment to invalidate existing cache)'
        required: false
        default: 'v2'
        type: string
  workflow_call:
    inputs:
      gdal_version:
        description: 'GDAL version(s) to build (e.g., 3.12.1 or 3.11.4,3.12.2 for multiple)'
        required: true
        type: string
      image_stage:
        description: 'Image stage to build: deps, full, or both'
        required: false
        default: 'deps'
        type: string
      push_images:
        description: 'Push images to GitHub Container Registry?'
        required: false
        default: 'true'
        type: string
      force_rebuild:
        description: 'Force rebuild even if images exist?'
        required: false
        default: 'false'
        type: string
      disable_cache:
        description: 'Disable Docker layer caching?'
        required: false
        default: 'false'
        type: string
      cache_version:
        description: 'Cache version for invalidation'
        required: false
        default: 'v2'
        type: string

permissions:
  contents: read
  packages: write

jobs:
  determine-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine versions to build
        id: versions
        run: |
          # Handle both workflow_dispatch and workflow_call input sources
          # workflow_dispatch: ${{ github.event.inputs.gdal_version }}
          # workflow_call: ${{ inputs.gdal_version }}
          INPUT_SOURCE="${{ inputs.gdal_version || github.event.inputs.gdal_version }}"
          
          # Read from .github/versions.json
          if [ -f .github/versions.json ]; then
            if [ -n "$INPUT_SOURCE" ]; then
              # If gdal_version provided, use that (can be comma-separated)
              INPUT="$INPUT_SOURCE"
              
              # Parse comma-separated versions into JSON array
              VERSIONS=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
              JSON_ARRAY=$(echo "$VERSIONS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
              MATRIX_JSON='{"version":'$JSON_ARRAY'}'
            else
              # Use supported versions from versions.json for scheduled/push-triggered runs
              VERSIONS=$(jq -c '.supported' .github/versions.json)
              MATRIX_JSON='{"version":'$VERSIONS'}'
            fi
          else
            # Fallback if versions.json doesn't exist
            if [ -n "$INPUT_SOURCE" ]; then
              INPUT="$INPUT_SOURCE"
              
              # Parse comma-separated versions into JSON array
              VERSIONS=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
              JSON_ARRAY=$(echo "$VERSIONS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
              MATRIX_JSON='{"version":'$JSON_ARRAY'}'
            else
              MATRIX_JSON='{"version":["3.11.4", "3.12.0"]}'
            fi
          fi
          
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
          echo "Versions to build:"
          echo "$MATRIX_JSON" | jq -r '.version[]' | nl

  build-deps:
    needs: determine-versions
    runs-on: ubuntu-latest
    if: ${{ (inputs.image_stage == 'deps' || inputs.image_stage == 'both' || github.event.inputs.image_stage == 'deps' || github.event.inputs.image_stage == 'both' || github.event_name != 'workflow_dispatch') }}
    env:
      # Handle both workflow_dispatch and workflow_call input sources
      PUSH_IMAGES: ${{ inputs.push_images || github.event.inputs.push_images || 'true' }}
      FORCE_REBUILD: ${{ inputs.force_rebuild || github.event.inputs.force_rebuild || 'false' }}
      DISABLE_CACHE: ${{ inputs.disable_cache || github.event.inputs.disable_cache || 'false' }}
      CACHE_VERSION: ${{ inputs.cache_version || github.event.inputs.cache_version || 'v2' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-versions.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: env.PUSH_IMAGES != 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract GDAL short version
        id: parse
        run: |
          VERSION="${{ matrix.version }}"
          SHORT=$(echo "$VERSION" | cut -d. -f1-2)
          echo "gdal_short=$SHORT" >> $GITHUB_OUTPUT

      - name: Check OSGeo GDAL image availability
        id: check-image
        run: |
          GDAL_VERSION="${{ matrix.version }}"

          TAGS_TO_TRY=(
            "ubuntu-small-${GDAL_VERSION}-amd64"
            "ubuntu-small-${GDAL_VERSION}"
            "ubuntu-small-latest-amd64"
            "ubuntu-small-latest"
            "ubuntu-small-amd64"
            "ubuntu-small"
            "latest"
          )

          SELECTED_TAG=""
          for TAG in "${TAGS_TO_TRY[@]}"; do
            IMAGE_TAG="ghcr.io/osgeo/gdal:${TAG}"
            echo "Checking: $IMAGE_TAG"

            if docker buildx imagetools inspect "$IMAGE_TAG" >/dev/null 2>&1; then
              echo "Found OSGeo GDAL image: $IMAGE_TAG"
              SELECTED_TAG="$TAG"
              break
            fi
          done

          if [ -z "$SELECTED_TAG" ]; then
            echo "No suitable OSGeo GDAL image found for version ${GDAL_VERSION}"
            exit 1
          fi

          echo "selected_gdal_image_tag=$SELECTED_TAG" >> $GITHUB_OUTPUT

      - name: Check if deps image already exists
        id: check-deps-exists
        if: env.FORCE_REBUILD != 'true'
        run: |
          DEPS_IMAGE="ghcr.io/${{ github.repository }}:deps-gdal-${{ matrix.version }}-amd64"
          echo "Checking if deps image exists: $DEPS_IMAGE"
          
          if docker buildx imagetools inspect "$DEPS_IMAGE" >/dev/null 2>&1; then
            echo "[INFO] Deps image already exists: $DEPS_IMAGE"
            echo "image_exists=true" >> $GITHUB_OUTPUT
          else
            echo "[INFO] Deps image does not exist, will build: $DEPS_IMAGE"
            echo "image_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push GDAL deps image
        id: build-deps
        if: env.FORCE_REBUILD == 'true' || steps.check-deps-exists.outputs.image_exists != 'true' || github.event_name == 'schedule'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/dockerfiles/Dockerfile.template
          target: r-packages
          build-args: |
            GDAL_BUILD_MODE=osgeo
            GDAL_VERSION=${{ matrix.version }}
            GDAL_RELEASE_TYPE=tagged
            GDAL_IMAGE_TAG=${{ steps.check-image.outputs.selected_gdal_image_tag }}
            R_VERSION=latest
            PACKAGE_VERSION=0.2.0
          tags: |
            ghcr.io/${{ github.repository }}:deps-gdal-${{ matrix.version }}-amd64
            ghcr.io/${{ github.repository }}:deps-gdal-${{ steps.parse.outputs.gdal_short }}-amd64
          platforms: linux/amd64
          cache-from: ${{ env.DISABLE_CACHE == 'false' && format('type=gha,scope=deps-gdal-{0}-{1}', matrix.version, env.CACHE_VERSION) || '' }}
          cache-to: ${{ env.DISABLE_CACHE == 'false' && format('type=gha,mode=max,scope=deps-gdal-{0}-{1}', matrix.version, env.CACHE_VERSION) || '' }}
          push: ${{ env.PUSH_IMAGES != 'false' }}
          provenance: false
          sbom: false

      - name: Run smoke tests on deps image
        if: steps.build-deps.outcome == 'success'
        run: |
          docker run --rm ghcr.io/${{ github.repository }}:deps-gdal-${{ matrix.version }}-amd64 bash -c '
            set -e
            echo "=== GDAL Smoke Test ==="
            gdal --version
            gdal --help-general
            echo "=== R Smoke Test ==="
            R --version | head -3
            Rscript -e "cat(\"R works\n\")"
            echo "=== R Packages Smoke Test ==="
            Rscript -e "library(processx); library(yyjsonr); library(gdalraster); cat(\"All deps present\\n\")"
            echo "=== All smoke tests passed ==="
          '

      - name: Generate build summary
        if: always()
        run: |
          echo "## Deps Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| GDAL Version | ${{ matrix.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Base Image | ghcr.io/osgeo/gdal:${{ steps.check-image.outputs.selected_gdal_image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Target Image | ghcr.io/${{ github.repository }}:deps-gdal-${{ matrix.version }}-amd64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Status | ${{ steps.build-deps.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pushed | ${{ env.PUSH_IMAGES != 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache Disabled | ${{ env.DISABLE_CACHE }} |" >> $GITHUB_STEP_SUMMARY

  build-full:
    runs-on: ubuntu-latest
    needs: [build-deps, determine-versions]
    if: |
      always() && 
      (needs.build-deps.result == 'success' || needs.build-deps.result == 'skipped') &&
      (inputs.image_stage == 'full' || inputs.image_stage == 'both' || github.event.inputs.image_stage == 'full' || github.event.inputs.image_stage == 'both' || github.event_name != 'workflow_dispatch')
    env:
      # Handle both workflow_dispatch and workflow_call input sources
      PUSH_IMAGES: ${{ inputs.push_images || github.event.inputs.push_images || 'true' }}
      FORCE_REBUILD: ${{ inputs.force_rebuild || github.event.inputs.force_rebuild || 'false' }}
      DISABLE_CACHE: ${{ inputs.disable_cache || github.event.inputs.disable_cache || 'false' }}
      CACHE_VERSION: ${{ inputs.cache_version || github.event.inputs.cache_version || 'v2' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-versions.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: env.PUSH_IMAGES != 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract GDAL short version
        id: parse
        run: |
          VERSION="${{ matrix.version }}"
          SHORT=$(echo "$VERSION" | cut -d. -f1-2)
          echo "gdal_short=$SHORT" >> $GITHUB_OUTPUT

      - name: Check OSGeo GDAL image availability
        id: check-image
        run: |
          GDAL_VERSION="${{ matrix.version }}"

          TAGS_TO_TRY=(
            "ubuntu-small-${GDAL_VERSION}-amd64"
            "ubuntu-small-${GDAL_VERSION}"
            "ubuntu-small-latest-amd64"
            "ubuntu-small-latest"
            "ubuntu-small-amd64"
            "ubuntu-small"
            "latest"
          )

          SELECTED_TAG=""
          for TAG in "${TAGS_TO_TRY[@]}"; do
            IMAGE_TAG="ghcr.io/osgeo/gdal:${TAG}"
            echo "Checking: $IMAGE_TAG"

            if docker buildx imagetools inspect "$IMAGE_TAG" >/dev/null 2>&1; then
              echo "Found OSGeo GDAL image: $IMAGE_TAG"
              SELECTED_TAG="$TAG"
              break
            fi
          done

          if [ -z "$SELECTED_TAG" ]; then
            echo "No suitable OSGeo GDAL image found for version ${GDAL_VERSION}"
            exit 1
          fi

          echo "selected_gdal_image_tag=$SELECTED_TAG" >> $GITHUB_OUTPUT

      - name: Check if runtime image already exists
        id: check-full-exists
        if: env.FORCE_REBUILD != 'true'
        run: |
          FULL_IMAGE="ghcr.io/${{ github.repository }}:gdal-${{ matrix.version }}-latest"
          echo "Checking if runtime image exists: $FULL_IMAGE"
          
          if docker buildx imagetools inspect "$FULL_IMAGE" >/dev/null 2>&1; then
            echo "[INFO] Runtime image already exists: $FULL_IMAGE"
            echo "image_exists=true" >> $GITHUB_OUTPUT
          else
            echo "[INFO] Runtime image does not exist, will build: $FULL_IMAGE"
            echo "image_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push GDAL full runtime image
        id: build-full
        if: env.FORCE_REBUILD == 'true' || steps.check-full-exists.outputs.image_exists != 'true' || github.event_name == 'schedule'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/dockerfiles/Dockerfile.template
          target: gdalcli-runtime
          build-args: |
            GDAL_BUILD_MODE=osgeo
            GDAL_VERSION=${{ matrix.version }}
            GDAL_RELEASE_TYPE=tagged
            GDAL_IMAGE_TAG=${{ steps.check-image.outputs.selected_gdal_image_tag }}
            R_VERSION=latest
            PACKAGE_VERSION=0.2.0
          tags: |
            ghcr.io/${{ github.repository }}:gdal-${{ matrix.version }}-latest
            ghcr.io/${{ github.repository }}:gdal-${{ steps.parse.outputs.gdal_short }}-latest
          platforms: linux/amd64
          cache-from: ${{ env.DISABLE_CACHE == 'false' && format('type=gha,scope=full-gdal-{0}-{1}', matrix.version, env.CACHE_VERSION || 'v2') || '' }}
          cache-to: ${{ env.DISABLE_CACHE == 'false' && format('type=gha,mode=max,scope=full-gdal-{0}-{1}', matrix.version, env.CACHE_VERSION || 'v2') || '' }}
          push: ${{ env.PUSH_IMAGES != 'false' }}
          provenance: false
          sbom: false

      - name: Run smoke tests on full image
        if: steps.build-full.outcome == 'success'
        run: |
          docker run --rm ghcr.io/${{ github.repository }}:gdal-${{ matrix.version }}-latest bash -c '
            set -e
            echo "=== GDAL Smoke Test ==="
            gdal --version
            echo "=== gdalcli Smoke Test ==="
            Rscript -e "library(gdalcli); print(gdal_capabilities()); cat(\"gdalcli loaded successfully\n\")"
            echo "=== Basic Pipeline Test ==="
            Rscript -e "
              library(gdalcli)
              job <- gdal_raster_info(input = \"/vsimem/test.tif\")
              cat(\"Pipeline created successfully\n\")
            "
            echo "=== All smoke tests passed ==="
          '

      - name: Generate build summary
        if: always()
        run: |
          echo "## Full Runtime Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| GDAL Version | ${{ matrix.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Base Image | ghcr.io/osgeo/gdal:${{ steps.check-image.outputs.selected_gdal_image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Target Image | ghcr.io/${{ github.repository }}:gdal-${{ matrix.version }}-latest |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Status | ${{ steps.build-full.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pushed | ${{ env.PUSH_IMAGES != 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache Disabled | ${{ env.DISABLE_CACHE }} |" >> $GITHUB_STEP_SUMMARY
